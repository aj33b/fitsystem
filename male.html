<style>
:root{--bg:#0a0a0f;--s:#12121a;--s2:#1a1a26;--bd:#2a2a3a;--t:#e8e8f0;--t2:#8888a0;--a:#ff3b30;--a2:#ff6b5b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);-webkit-font-smoothing:antialiased}
.ct{max-width:900px;margin:0 auto;padding:0 16px 100px;position:relative}
.hero{padding:60px 0 24px;text-align:center;border-bottom:1px solid var(--bd)}
.hero-l{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--a);text-transform:uppercase;margin-bottom:10px}

.dn{display:flex;gap:3px;padding:8px 4px calc(8px + env(safe-area-inset-bottom));position:fixed;bottom:0;left:0;right:0;background:var(--s);z-index:100;border-top:1px solid var(--bd);box-shadow:0 -4px 20px rgba(0,0,0,.5)}

.db.act{background:var(--a);border-color:var(--a);color:#fff}

.bg{margin-top:24px}

.bd-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bt{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff}

.yb{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:#ff0000;color:#fff;border-radius:6px;text-decoration:none;font-size:11px;font-weight:700;margin-top:6px;touch-action:manipulation}.yb svg{width:12px;height:12px}
.mc{background:var(--s);border:1px solid var(--bd);border-radius:10px;margin-top:10px;overflow:hidden}
.mh{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.mt-label{font-size:10px;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:1px}
.mn{font-weight:700;font-size:14px;color:#fff;margin-top:2px}
.ml{font-size:11px;color:var(--t2);margin-top:2px}
.ma{font-size:16px;color:var(--t2);transition:transform .2s}.mc.open .ma{transform:rotate(180deg)}
.mb{display:none;padding:0 14px 14px;border-top:1px solid var(--bd)}.mc.open .mb{display:block}
.il{list-style:none;padding:0;margin:10px 0}.il li{padding:5px 0;font-size:12px;border-bottom:1px solid var(--bd)}.il li:last-child{border-bottom:none}
.sl{padding-left:18px;margin:10px 0}.sl li{padding:4px 0;font-size:12px;line-height:1.7}
.tb{background:#ff3b3010;border-left:3px solid var(--a);padding:10px 12px;border-radius:0 8px 8px 0;margin-top:10px;font-size:11px;line-height:1.6;color:var(--t2)}.tb b{color:var(--a)}
.rh{text-align:center;padding:50px 20px}
.rh h2{font-family:'Bebas Neue',sans-serif;font-size:40px;color:#fff}
.rh p{color:var(--t2);font-size:13px;margin-top:8px;max-width:500px;margin-inline:auto;line-height:1.7}
.rl{margin-top:20px;text-align:left;max-width:400px;margin-inline:auto;list-style:none;padding:0}
.rl li{padding:7px 0;font-size:13px;color:var(--t);border-bottom:1px solid var(--bd)}
.ft{text-align:center;padding:28px 0;margin-top:32px;border-top:1px solid var(--bd);font-size:10px;color:var(--t2)}
.dtg{display:flex;gap:8px;margin-bottom:14px}
.dtb{flex:1;padding:10px;border:1px solid var(--bd);border-radius:8px;background:var(--s);color:var(--t2);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;touch-action:manipulation}
.dtb.act{background:var(--a);color:#fff}
@media(max-width:600px){.db .dn-t{display:none}.db{font-size:9px}.hero h1{font-size:32px}}
</style>
</head>

// =============== SATURDAY — REST ===============
{id:'sat',name:'Saturday',type:'Rest',focus:'Recovery',dur:'—',exCount:0,bodyParts:[],meals:{nepali:[],western:[]}}
];

const YT=(q)=>`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`;
const SV=`<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
const TP={bb:'Barbell',db:'Dumbbell',mc:'Machine',cb:'Cable',bw:'Bodyweight',bd:'Band'};

function renderApp(){
  const nav=document.getElementById('dayNav');
  nav.innerHTML=DAYS.map(d=>`<button class="db${d.id===DAYS[0].id?' act':''}" data-day="${d.id}"><span class="dn-n">${d.name.slice(0,3)}</span><span class="dn-t">${d.type}</span></button>`).join('');

  const app=document.getElementById('app');
  let h='';
  DAYS.forEach((d,di)=>{
    h+=`<div class="dc${di===0?' vis':''}" id="day-${d.id}">`;
    if(d.type==='Rest'){
      h+=`<div class="rh"><h2>REST & RECOVER</h2><p>Muscles grow while you rest. Today is when your body repairs and comes back stronger.</p><ul class="rl"><li>✓ Sleep 8–9 hours</li><li>✓ Light walk 20–30 min</li><li>✓ Stretching or yoga 15–20 min</li><li>✓ Foam rolling sore muscles</li><li>✓ Eat at maintenance — reduce carbs 25%, keep protein same</li><li>✓ Drink 3+ litres water</li><li>✓ Weekly progress photo (front, side, back — same lighting)</li><li>✓ Meal prep for the week ahead</li><li>✓ Review workout log — did you progress?</li></ul></div>`;
    } else {
      h+=`<div class="st"><button class="stb act" data-section="workout" data-parent="${d.id}">Workout</button><button class="stb" data-section="meals" data-parent="${d.id}">Meals & Recipes</button></div>`;
      h+=`<div class="sc vis" id="${d.id}-workout">`;
      h+=`<div class="ov"><div class="oc"><div class="ov-v">${d.type.toUpperCase()}</div><div class="ov-l">Session</div></div><div class="oc"><div class="ov-v">${d.focus.toUpperCase()}</div><div class="ov-l">Focus</div></div><div class="oc"><div class="ov-v">${d.exCount}</div><div class="ov-l">Exercises</div></div><div class="oc"><div class="ov-v">${d.dur}</div><div class="ov-l">Duration</div></div></div>`;

      let exNum=0;
      d.bodyParts.forEach(bp=>{
        h+=`<div class="bg"><div class="bh"><div class="bd-dot" style="background:${bp.color}"></div><div class="bt">${bp.name}</div></div>`;
        bp.exercises.forEach(ex=>{
          exNum++;
          h+=`<div class="ec"><div class="eh" role="button" tabindex="0"><div style="display:flex;align-items:center"><div class="en" style="background:${bp.color}">${exNum}</div><div class="ei"><div class="ei-n">${ex.name}</div><div class="ei-m">${ex.sets} · Rest ${ex.rest} · ${ex.target}</div></div></div><span class="ea">▾</span></div>`;
          h+=`<div class="eb"><div class="cue"><b>Form & Execution:</b> ${ex.form}</div>`;
          h+=`<div class="vt">6 Variations — Each with Video Guide</div><div class="vg">`;
          ex.vars.forEach(v=>{
            h+=`<div class="vi"><div class="vi-h" role="button" tabindex="0"><span class="vi-n">${v.n}</span><span class="vi-t tp-${v.tp}">${TP[v.tp]}</span><span class="vi-a">▾</span></div>`;
            h+=`<div class="vi-b"><p style="margin-bottom:8px">${v.tip}</p><a class="yb" href="${v.yt}" target="_blank" rel="noopener">${SV} Watch Form Video</a></div></div>`;
          });
          h+=`</div></div></div>`;
        });
        h+=`</div>`;
      });
      h+=`</div>`;

      h+=`<div class="sc" id="${d.id}-meals"><div style="margin-top:16px">`;
      h+=`<div class="dtg"><button class="dtb act" data-diet="nepali" data-day="${d.id}">Nepali Diet</button><button class="dtb" data-diet="western" data-day="${d.id}">Western Diet</button></div>`;

      ['nepali','western'].forEach(dt=>{
        (d.meals[dt]||[]).forEach(m=>{
          h+=`<div class="mc diet-${dt}-${d.id}"${dt==='western'?' style="display:none"':''}>`;
          h+=`<div class="mh" role="button" tabindex="0"><div><div class="mt-label">${m.time} — ${m.label}</div><div class="mn">${m.name}</div><div class="ml">${m.cal} · P:${m.pro} C:${m.carb} F:${m.fat}</div></div><span class="ma">▾</span></div>`;
          h+=`<div class="mb"><div class="vt">Ingredients</div><ul class="il">${m.ing.map(i=>`<li>${i}</li>`).join('')}</ul>`;
          h+=`<div class="vt">Step-by-Step Instructions</div><ol class="sl">${m.steps.map(s=>`<li>${s}</li>`).join('')}</ol>`;
          h+=`<div class="tb"><b>Pro Tip: </b>${m.tip}</div>`;
          h+=`<a class="yb" href="${YT(m.name+' recipe')}" target="_blank" style="margin-top:8px">${SV} Watch Recipe Video</a>`;
          h+=`</div></div>`;
        });
      });

      const totals=d.totals||{p:'130g',c:'360g',f:'80g',k:'~2,750 kcal'};
      h+=`<div style="margin-top:16px;padding:14px;background:var(--s);border:1px solid var(--bd);border-radius:10px"><div style="font-family:Bebas Neue,sans-serif;font-size:16px;color:#fff;margin-bottom:8px">Daily Totals</div><div style="display:flex;gap:8px;flex-wrap:wrap"><span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:#ff3b3020;color:#ff6b5b">Protein ${totals.p}</span><span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:#5ac8fa20;color:#5ac8fa">Carbs ${totals.c}</span><span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:#ffd60a20;color:#ffd60a">Fat ${totals.f}</span><span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:#34c75920;color:#34c759">${totals.k}</span></div></div>`;
      h+=`</div></div>`;
    }
    h+=`</div>`;
  });
  app.innerHTML=h;
}

renderApp();

document.addEventListener('click',function(e){
  const db=e.target.closest('.db');
  if(db){document.querySelectorAll('.db').forEach(b=>b.classList.remove('act'));db.classList.add('act');document.querySelectorAll('.dc').forEach(d=>d.classList.remove('vis'));document.getElementById('day-'+db.dataset.day).classList.add('vis');window.scrollTo(0,0);return;}
  const stb=e.target.closest('.stb');
  if(stb){const p=stb.dataset.parent;stb.parentElement.querySelectorAll('.stb').forEach(t=>t.classList.remove('act'));stb.classList.add('act');document.getElementById('day-'+p).querySelectorAll('.sc').forEach(s=>s.classList.remove('vis'));document.getElementById(p+'-'+stb.dataset.section).classList.add('vis');return;}
  const eh=e.target.closest('.eh');if(eh){eh.closest('.ec').classList.toggle('open');return;}
  const vih=e.target.closest('.vi-h');if(vih){vih.closest('.vi').classList.toggle('open');return;}
  const mh=e.target.closest('.mh');if(mh){mh.closest('.mc').classList.toggle('open');return;}
  const dtb=e.target.closest('.dtb');
  if(dtb){const dt=dtb.dataset.diet,day=dtb.dataset.day;dtb.parentElement.querySelectorAll('.dtb').forEach(b=>{b.classList.remove('act');b.style.background='var(--s)';b.style.color='var(--t2)';});dtb.classList.add('act');dtb.style.background='var(--a)';dtb.style.color='#fff';document.querySelectorAll('.diet-nepali-'+day).forEach(c=>c.style.display=dt==='nepali'?'block':'none');document.querySelectorAll('.diet-western-'+day).forEach(c=>c.style.display=dt==='western'?'block':'none');}
});

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}

</script>

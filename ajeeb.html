/* ============================================
   FITSYSTEM v3 - Industry Standard Mobile UI
   Inspired by best-in-class fitness apps
   ============================================ */

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  background:#000;
  color:#fff;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:'cv02','cv03','cv04','cv11';
  overflow-x:hidden;
}
body{
  padding-top:env(safe-area-inset-top);
  min-height:100vh;
  position:relative;
}

/* ============== APP SHELL ============== */
.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  padding-bottom:calc(76px + env(safe-area-inset-bottom));
}

/* ============== TOP BAR ============== */
.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(10,10,14,0.85);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.topbar-back{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  color:#fff;text-decoration:none;font-size:18px;font-weight:300;
  transition:background 0.2s;
}
.topbar-back:active{background:rgba(255,255,255,0.15)}
.topbar-title{font-size:16px;font-weight:600;letter-spacing:-0.2px}
.topbar-spacer{width:36px}

/* ============== HERO ============== */
.hero{padding:24px 20px 16px}
.hero-greeting{font-size:14px;color:#888;margin-bottom:6px;font-weight:500}
.hero-name{font-size:28px;font-weight:800;letter-spacing:-0.8px;line-height:1.1;margin-bottom:20px}
.hero-name em{font-family:'Playfair Display',serif;font-weight:700;font-style:italic;color:var(--accent)}

/* ============== STAT GRID ============== */
.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:0 20px;
  margin-bottom:24px;
}
.stat{
  background:rgba(20,20,24,0.7);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;
  padding:14px;
  position:relative;
  overflow:hidden;
}
.stat-label{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:800;letter-spacing:-0.5px;line-height:1}
.stat-unit{font-size:12px;color:#666;font-weight:500;margin-left:2px}
.stat-progress{margin-top:8px;height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden}
.stat-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s}

/* ============== SECTION HEADER ============== */
.section{padding:0 20px;margin-bottom:24px}
.section-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.section-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.section-action{font-size:13px;color:var(--accent);font-weight:600;text-decoration:none}

/* ============== TODAY CARD (HERO WORKOUT) ============== */
.today-card{
  background:linear-gradient(135deg,rgba(255,59,48,0.15),rgba(232,101,160,0.05));
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:20px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
}
.today-card.female{
  background:linear-gradient(135deg,rgba(232,101,160,0.15),rgba(179,136,245,0.05));
}
.today-card-bg{
  position:absolute;
  top:-40px;right:-40px;
  width:160px;height:160px;
  border-radius:50%;
  background:radial-gradient(circle,var(--accent) 0%,transparent 70%);
  opacity:0.3;
  pointer-events:none;
}
.today-label{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;position:relative}
.today-title{font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;position:relative}
.today-meta{font-size:13px;color:#aaa;display:flex;gap:12px;align-items:center;flex-wrap:wrap;position:relative;margin-bottom:16px}
.today-meta span{display:inline-flex;align-items:center;gap:5px}
.today-cta{
  background:#fff;color:#000;
  border:none;
  padding:11px 20px;
  border-radius:12px;
  font-weight:700;font-size:14px;
  letter-spacing:-0.2px;
  cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;
  position:relative;
  font-family:inherit;
}
.today-cta:active{transform:scale(0.97)}

/* ============== WEEK PROGRESS ============== */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day-pill{
  background:rgba(20,20,24,0.7);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;
  padding:10px 4px;
  text-align:center;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
}
.day-pill:active{transform:scale(0.95)}
.day-pill.today{
  background:rgba(255,59,48,0.15);
  border-color:var(--accent);
}
.day-pill.female.today{background:rgba(232,101,160,0.15)}
.day-pill.rest{opacity:0.5}
.day-pill .dp-name{font-size:10px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.day-pill.today .dp-name{color:var(--accent)}
.day-pill .dp-num{font-size:16px;font-weight:700;color:#fff}
.day-pill .dp-dot{width:4px;height:4px;background:var(--accent);border-radius:50%;margin:4px auto 0;opacity:0}
.day-pill.today .dp-dot{opacity:1}

/* ============== DAY DETAIL VIEW ============== */
.view{display:none;animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1)}
.view.active{display:block}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ============== EXERCISE LIST ============== */
.body-group{margin-bottom:24px}
.body-group-head{
  display:flex;align-items:center;gap:10px;
  padding:0 20px;margin-bottom:12px;
}
.body-group-icon{
  width:32px;height:32px;
  border-radius:10px;
  background:var(--bp-color);
  opacity:0.2;
  position:relative;
}
.body-group-icon::after{
  content:'';position:absolute;inset:0;
  background:var(--bp-color);
  border-radius:10px;
  opacity:0.5;
  filter:blur(8px);
}
.body-group-name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff}
.body-group-count{font-size:11px;color:#666;font-weight:500;margin-left:auto;padding-right:20px}

.exercise-list{padding:0 20px;display:flex;flex-direction:column;gap:8px}
.exercise-card{
  background:rgba(20,20,24,0.7);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;
  padding:14px 16px;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;gap:12px;
}
.exercise-card:active{transform:scale(0.98);background:rgba(30,30,36,0.7)}
.exercise-num{
  width:28px;height:28px;border-radius:8px;
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#888;flex-shrink:0;
}
.exercise-info{flex:1;min-width:0}
.exercise-name{font-size:14px;font-weight:600;letter-spacing:-0.2px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exercise-meta{font-size:11px;color:#666;display:flex;gap:10px;align-items:center}
.exercise-meta span{display:inline-flex;align-items:center;gap:3px}
.exercise-arrow{color:#444;font-size:18px;font-weight:300}

/* ============== EXERCISE DETAIL MODAL ============== */
.modal{
  position:fixed;
  inset:0;
  z-index:200;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:none;
  animation:fadeIn 0.25s ease;
}
.modal.show{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{
  position:absolute;
  bottom:0;left:0;right:0;
  background:#0f0f14;
  border-radius:24px 24px 0 0;
  max-height:90vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:env(safe-area-inset-bottom);
  animation:sheetUp 0.35s cubic-bezier(0.4,0,0.2,1);
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{
  width:36px;height:4px;
  background:rgba(255,255,255,0.2);
  border-radius:2px;
  margin:10px auto 0;
}
.modal-head{padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;background:#0f0f14;z-index:10}
.modal-close{
  position:absolute;top:12px;right:16px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:none;color:#fff;font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.modal-title{font-size:18px;font-weight:700;letter-spacing:-0.3px;padding-right:36px}
.modal-subtitle{font-size:12px;color:#888;margin-top:2px}
.modal-body{padding:16px 20px 24px}

.detail-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.detail-stat{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px;text-align:center}
.detail-stat-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:4px}
.detail-stat-value{font-size:16px;font-weight:700;letter-spacing:-0.3px}

.detail-section{margin-bottom:24px}
.detail-section-title{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.detail-section-title::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:1px}
.detail-form{
  background:rgba(255,255,255,0.04);
  border-radius:14px;
  padding:14px 16px;
  font-size:13px;line-height:1.7;color:#ccc;
}

/* Variations grid */
.variations{display:flex;flex-direction:column;gap:8px}
.variation{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;
  overflow:hidden;
}
.variation-head{
  padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;
  gap:8px;
}
.variation-name{font-size:13px;font-weight:600;flex:1}
.variation-tag{
  font-size:9px;font-weight:700;
  padding:3px 8px;border-radius:6px;
  text-transform:uppercase;letter-spacing:0.5px;
  flex-shrink:0;
}
.variation-tag.bb{background:rgba(255,59,48,0.15);color:#ff6b5b}
.variation-tag.db{background:rgba(90,200,250,0.15);color:#5ac8fa}
.variation-tag.mc{background:rgba(52,199,89,0.15);color:#34c759}
.variation-tag.cb{background:rgba(255,214,10,0.15);color:#ffd60a}
.variation-tag.bw{background:rgba(191,90,242,0.15);color:#bf5af2}
.variation-tag.bd{background:rgba(255,159,10,0.15);color:#ff9f0a}
.variation-arrow{color:#444;font-size:12px;transition:transform 0.2s}
.variation.open .variation-arrow{transform:rotate(180deg)}
.variation-body{display:none;padding:0 14px 14px}
.variation.open .variation-body{display:block}
.variation-tip{font-size:12px;line-height:1.6;color:#aaa;margin-bottom:10px}
.yt-link{
  display:inline-flex;align-items:center;gap:6px;
  background:#ff0000;color:#fff;
  padding:7px 12px;border-radius:8px;
  text-decoration:none;font-size:11px;font-weight:600;
}
.yt-link:active{transform:scale(0.96)}
.yt-link svg{width:12px;height:12px}

/* ============== NUTRITION VIEW ============== */
.diet-toggle{
  display:flex;
  background:rgba(20,20,24,0.7);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;
  padding:3px;
  margin:0 20px 16px;
  position:relative;
}
.diet-tab{
  flex:1;padding:10px;
  background:none;border:none;
  color:#888;font-size:13px;font-weight:600;
  cursor:pointer;border-radius:9px;
  transition:all 0.25s;
  font-family:inherit;
}
.diet-tab.active{background:#fff;color:#000;font-weight:700}

.meals-list{padding:0 20px;display:flex;flex-direction:column;gap:10px}
.meal-card{
  background:rgba(20,20,24,0.7);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;
  padding:14px 16px;
  cursor:pointer;
  display:flex;align-items:center;gap:12px;
  transition:all 0.2s;
}
.meal-card:active{transform:scale(0.98)}
.meal-time-badge{
  background:rgba(255,255,255,0.06);
  border-radius:10px;
  padding:8px 10px;
  text-align:center;
  flex-shrink:0;
  min-width:62px;
}
.meal-time-badge .time{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.3px}
.meal-time-badge .label{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;font-weight:600}
.meal-info{flex:1;min-width:0}
.meal-name{font-size:14px;font-weight:600;letter-spacing:-0.2px;margin-bottom:3px;line-height:1.3}
.meal-macros{font-size:11px;color:#888;display:flex;gap:8px}
.meal-macros span{display:inline-flex;align-items:center;gap:3px}
.meal-arrow{color:#444;font-size:18px;font-weight:300}

/* Daily macros card */
.macros-card{
  background:rgba(20,20,24,0.7);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  padding:16px;
  margin:0 20px 20px;
}
.macros-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.macros-title{font-size:13px;font-weight:700;letter-spacing:-0.2px}
.macros-cal{font-size:11px;color:#666;font-weight:600}
.macros-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.macro{text-align:center}
.macro-value{font-size:18px;font-weight:800;letter-spacing:-0.5px;margin-bottom:2px}
.macro-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.macro.protein .macro-value{color:#ff6b5b}
.macro.carbs .macro-value{color:#5ac8fa}
.macro.fat .macro-value{color:#ffd60a}

/* ============== RECIPE MODAL ============== */
.recipe-section{margin-bottom:20px}
.recipe-section-title{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.recipe-section-title::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:1px}
.recipe-ingredients{
  background:rgba(255,255,255,0.04);
  border-radius:12px;
  padding:12px 14px;
  list-style:none;
}
.recipe-ingredients li{
  font-size:13px;line-height:1.7;
  padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
  color:#ccc;
}
.recipe-ingredients li:last-child{border:none}
.recipe-steps{padding-left:0;list-style:none;counter-reset:step}
.recipe-steps li{
  position:relative;padding:10px 0 10px 36px;
  font-size:13px;line-height:1.7;color:#ccc;
  counter-increment:step;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.recipe-steps li:last-child{border:none}
.recipe-steps li::before{
  content:counter(step);
  position:absolute;left:0;top:8px;
  width:24px;height:24px;
  background:var(--accent);
  color:#fff;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
}
.recipe-tip{
  background:rgba(255,59,48,0.08);
  border-left:3px solid var(--accent);
  padding:12px 14px;
  border-radius:0 10px 10px 0;
  font-size:12px;line-height:1.7;color:#ddd;
  margin-top:12px;
}
.recipe-tip strong{color:var(--accent);font-weight:700}

/* ============== BOTTOM TAB BAR ============== */
.tabbar{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:100;
  background:rgba(10,10,14,0.92);
  backdrop-filter:saturate(180%) blur(24px);
  -webkit-backdrop-filter:saturate(180%) blur(24px);
  border-top:1px solid rgba(255,255,255,0.06);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  display:flex;
  justify-content:space-around;
  align-items:stretch;
  max-width:480px;
  margin:0 auto;
}
.tab{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;
  padding:6px 4px;
  background:none;border:none;
  cursor:pointer;
  color:#666;
  transition:color 0.2s;
  font-family:inherit;
  text-decoration:none;
}
.tab.active{color:var(--accent)}
.tab:active{transform:scale(0.95)}
.tab svg{width:22px;height:22px;stroke-width:2}
.tab-label{font-size:10px;font-weight:600;letter-spacing:0.2px}

/* ============== UTILITIES ============== */
.empty-state{text-align:center;padding:60px 20px;color:#666}
.empty-state h3{font-size:18px;color:#fff;margin-bottom:6px;font-weight:700}
.empty-state p{font-size:13px;line-height:1.6}

/* Rest day */
.rest-view{padding:40px 20px;text-align:center}
.rest-icon{
  width:80px;height:80px;
  margin:0 auto 20px;
  border-radius:24px;
  background:linear-gradient(135deg,rgba(52,199,89,0.2),rgba(52,199,89,0.05));
  display:flex;align-items:center;justify-content:center;
  font-size:40px;
}
.rest-title{font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px}
.rest-subtitle{font-size:14px;color:#888;line-height:1.6;max-width:300px;margin:0 auto 24px}
.rest-checklist{
  background:rgba(20,20,24,0.7);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  padding:16px;
  text-align:left;
  list-style:none;
}
.rest-checklist li{
  font-size:13px;line-height:1.6;
  padding:10px 0 10px 28px;
  position:relative;
  border-bottom:1px solid rgba(255,255,255,0.04);
  color:#ccc;
}
.rest-checklist li:last-child{border:none}
.rest-checklist li::before{
  content:'';position:absolute;left:0;top:14px;
  width:18px;height:18px;
  background:rgba(52,199,89,0.2);
  border:1.5px solid #34c759;
  border-radius:50%;
}
.rest-checklist li::after{
  content:'';position:absolute;left:5px;top:18px;
  width:8px;height:5px;
  border-left:2px solid #34c759;
  border-bottom:2px solid #34c759;
  transform:rotate(-45deg);
}

/* ============== V4 ADDITIONS ============== */
/* Mode toggle (Today / Browse) */
.mode-toggle{
  display:flex;
  background:rgba(20,20,24,0.7);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;
  padding:3px;
  margin:14px 20px 0;
}
.mode-tab{
  flex:1;padding:10px;
  background:none;border:none;
  color:#888;font-size:13px;font-weight:600;
  cursor:pointer;border-radius:9px;
  transition:all 0.2s;
  font-family:inherit;
}
.mode-tab.active{background:#fff;color:#000;font-weight:700}
.mode-tab:active{transform:scale(0.97)}

/* Search bar */
.search-bar{
  display:flex;align-items:center;gap:10px;
  margin:14px 20px;
  padding:10px 14px;

function getTodayId(){
  return ['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
}

function getTrainingDayId(){
  // Today's training day, or next training day if today is rest
  const todayId = getTodayId();
  const today = DAYS.find(d => d.id === todayId);
  if (today && today.type !== 'Rest') return todayId;
  
  const idx = DAYS.findIndex(d => d.id === todayId);
  for (let i = 1; i <= 7; i++) {
    const next = DAYS[(idx + i) % DAYS.length];
    if (next.type !== 'Rest') return next.id;
  }
  return DAYS[0].id;
}

function getGreeting(){
  const h = new Date().getHours();
  if (h < 12) return 'Good morning,';
  if (h < 17) return 'Good afternoon,';
  return 'Good evening,';
}

function getWeightProgress(){
  if (!PROFILE.targetWeight) return 0;
  if (PROFILE.targetWeight > PROFILE.weight) {
    const range = PROFILE.targetWeight - PROFILE.startWeight;
    const progress = PROFILE.weight - PROFILE.startWeight;
    return Math.max(0, Math.min(100, (progress/range)*100));
  }
  const range = PROFILE.startWeight - PROFILE.targetWeight;
  const progress = PROFILE.startWeight - PROFILE.weight;
  return Math.max(0, Math.min(100, (progress/range)*100));
}

// Categorize meal by time
function getMealCategory(time){
  const hour = parseInt(time.split(':')[0]);
  const isAM = time.toLowerCase().includes('am');
  const h24 = isAM ? (hour === 12 ? 0 : hour) : (hour === 12 ? 12 : hour + 12);
  if (h24 < 11) return 'breakfast';
  if (h24 < 15) return 'lunch';
  if (h24 < 18) return 'snack';
  return 'dinner';
}

// Get all body parts across all days (deduplicated)
function getAllBodyParts(){
  const set = new Set();
  DAYS.forEach(d => {
    if (d.bodyParts) d.bodyParts.forEach(bp => set.add(bp.name));
  });
  return Array.from(set);
}

function distributeRecipes(){
  if (typeof RECIPE_BANK === 'undefined') return;
  DISTRIBUTIONS.forEach(([idx, dayId, diet, label]) => {
    const r = RECIPE_BANK[idx];
    if (!r) return;
    const day = DAYS.find(d => d.id === dayId);
    if (!day || !day.meals) return;
    if (!day.meals[diet]) day.meals[diet] = [];
    // Only add if not already present (avoid duplicates on re-init)
    const alreadyPresent = day.meals[diet].some(m => m.name === r.name);
    if (alreadyPresent) return;
    day.meals[diet].push({
      time: r.time, label: label, name: r.name,
      cal: r.cal, pro: r.pro, carb: r.carb, fat: r.fat,
      ing: r.ing, steps: r.steps, tip: r.tip
    });
  });
}

  // Distribute recipe bank into day meals

}

function switchTab(name){
  state.currentTab = name;
  // When entering Workouts or Nutrition tab in Today mode, refresh to today
  if (name === 'workouts' && state.workoutMode === 'today') {
    state.workoutDay = getTrainingDayId();
    renderWorkoutContent && renderWorkoutContent();
  }
  if (name === 'nutrition' && state.nutritionMode === 'today') {
    state.nutritionDay = getTrainingDayId();
    renderNutritionContent && renderNutritionContent();
  }
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-'+name));
  window.scrollTo({top:0});
}

    return `<button class="chip ${isActive?'active':''}" data-action="set-workout-filter" data-filter="${bp}">

function renderBrowseWorkoutsResults(){
  const results = document.getElementById('browse-workouts-results');
  if (!results) return;
  
  // Collect all exercises matching filters
  const matches = [];
  DAYS.forEach(day => {
    if (!day.bodyParts) return;
    if (state.workoutDay !== 'all' && day.id !== state.workoutDay) return;
    
    day.bodyParts.forEach((bp, bpIdx) => {
      if (state.workoutFilter !== 'all' && bp.name !== state.workoutFilter) return;
      
      bp.exercises.forEach((ex, exIdx) => {
        if (state.workoutSearch) {
          const q = state.workoutSearch.toLowerCase();
          const inName = ex.name.toLowerCase().includes(q);
          const inTarget = ex.target.toLowerCase().includes(q);
          const inVars = ex.vars.some(v => v.n.toLowerCase().includes(q));
          if (!inName && !inTarget && !inVars) return;
        }
        matches.push({day, bp, bpIdx, ex, exIdx});
      });
    });
  });
  
  if (matches.length === 0) {
    results.innerHTML = `<div class="empty-state"><h3>No exercises found</h3><p>Try adjusting your filters or search.</p></div>`;
    return;
  }
  
  const showingAllDays = state.workoutDay === 'all';
  
  let html = `<div style="padding:8px 20px 4px;font-size:12px;color:#666;font-weight:500">${matches.length} exercise${matches.length===1?'':'s'} found${showingAllDays ? ' across all days' : ''}</div>`;
  
  if (showingAllDays) {
    // Group by day, then body part within day
    const byDay = {};
    const dayOrder = [];
    matches.forEach(m => {
      if (!byDay[m.day.id]) { byDay[m.day.id] = {}; dayOrder.push(m.day.id); }
      if (!byDay[m.day.id][m.bp.name]) byDay[m.day.id][m.bp.name] = { bp: m.bp, items: [] };
      byDay[m.day.id][m.bp.name].items.push(m);
    });
    
    dayOrder.forEach(dayId => {
      const day = DAYS.find(d => d.id === dayId);
      const dayLabel = day && day.type === 'Rest' ? `${DAY_NAMES_FULL[dayId]} (Rest Day)` : `${DAY_NAMES_FULL[dayId]} - ${day ? day.type : ''}`;
      html += `<div class="day-section-head">${dayLabel}</div>`;
      
      const bpGroups = byDay[dayId];
      Object.values(bpGroups).forEach(g => {
        html += `
          <div class="body-group">
            <div class="body-group-head">
              <div class="body-group-icon" style="--bp-color:${g.bp.color}"></div>
              <div class="body-group-name">${g.bp.name}</div>
              <div class="body-group-count">${g.items.length} exercise${g.items.length===1?'':'s'}</div>
            </div>
            <div class="exercise-list">
              ${g.items.map((m, i) => `
                <div class="exercise-card" data-action="open-exercise" data-day="${m.day.id}" data-bp="${m.bpIdx}" data-ex="${m.exIdx}">
                  <div class="exercise-num">${i + 1}</div>
                  <div class="exercise-info">
                    <div class="exercise-name">${m.ex.name}</div>
                    <div class="exercise-meta">
                      <span>${m.ex.sets}</span>
                      <span>&middot;</span>
                      <span>${m.ex.rest}</span>
                      <span>&middot;</span>
                      <span>${m.ex.vars.length} variations</span>
                    </div>
                  </div>
                  <div class="exercise-arrow">&rsaquo;</div>
                </div>
              `).join('')}
            </div>
          </div>`;
      });
    });
  } else {
    // Single day - group by body part
    const grouped = {};
    matches.forEach(m => {
      if (!grouped[m.bp.name]) grouped[m.bp.name] = {bp: m.bp, items: []};
      grouped[m.bp.name].items.push(m);
    });
    
    Object.values(grouped).forEach(g => {
      html += `
        <div class="body-group">
          <div class="body-group-head">
            <div class="body-group-icon" style="--bp-color:${g.bp.color}"></div>
            <div class="body-group-name">${g.bp.name}</div>
            <div class="body-group-count">${g.items.length} exercise${g.items.length===1?'':'s'}</div>
          </div>
          <div class="exercise-list">
            ${g.items.map((m, i) => `
              <div class="exercise-card" data-action="open-exercise" data-day="${m.day.id}" data-bp="${m.bpIdx}" data-ex="${m.exIdx}">
                <div class="exercise-num">${i + 1}</div>
                <div class="exercise-info">
                  <div class="exercise-name">${m.ex.name}</div>
                  <div class="exercise-meta">
                    <span>${m.ex.sets}</span>
                    <span>&middot;</span>
                    <span>${m.ex.rest}</span>
                    <span>&middot;</span>
                    <span>${m.ex.vars.length} variations</span>
                  </div>
                </div>
                <div class="exercise-arrow">&rsaquo;</div>
              </div>
            `).join('')}
          </div>
        </div>`;
    });
  }
  
  results.innerHTML = html;
}

function renderTodayNutrition(container){
  // Validate state.nutritionDay - if 'all' or invalid (from browse mode), reset to today
  let day = DAYS.find(d => d.id === state.nutritionDay);
  if (!day) {
    state.nutritionDay = getTrainingDayId();
    day = DAYS.find(d => d.id === state.nutritionDay);
  }
  const meals = (day.meals && day.meals[state.nutritionDiet]) || [];
  
  const dietToggle = `
    <div class="diet-toggle">
      <button class="diet-tab ${state.nutritionDiet==='nepali'?'active':''}" data-action="set-diet" data-diet="nepali">Nepali</button>
      <button class="diet-tab ${state.nutritionDiet==='western'?'active':''}" data-action="set-diet" data-diet="western">Western</button>
    </div>`;
  
  const totals = day.totals || {p:PROFILE.protein+'g',c:PROFILE.carbs+'g',f:PROFILE.fat+'g',k:'~'+PROFILE.calories+' kcal'};
  
  const macrosCard = `
    <div class="macros-card">
      <div class="macros-head">
        <div class="macros-title">${day.type === 'Rest' ? 'Rest Day Targets' : 'Daily Targets'}</div>
        <div class="macros-cal">${totals.k}</div>
      </div>
      <div class="macros-grid">
        <div class="macro protein"><div class="macro-value">${totals.p}</div><div class="macro-label">Protein</div></div>
        <div class="macro carbs"><div class="macro-value">${totals.c}</div><div class="macro-label">Carbs</div></div>
        <div class="macro fat"><div class="macro-value">${totals.f}</div><div class="macro-label">Fat</div></div>
      </div>
    </div>`;
  
  if (meals.length === 0) {
    container.innerHTML = `
      <div style="padding:20px 20px 0">
        <div style="font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Today - ${DAY_NAMES_FULL[day.id]}</div>
        <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:16px">${day.type}</div>
      </div>
      ${macrosCard}
      <div class="empty-state"><h3>No meals yet</h3><p>Rest day nutrition is being prepared.</p></div>
    `;
    return;
  }
  
  // Group meals by label (slot). Multiple meals at same slot = alternatives
  const groups = {};
  const order = [];
  meals.forEach((m, i) => {
    const slot = m.label.replace(' CHEAT MEAL', '').trim();
    if (!groups[slot]) { groups[slot] = []; order.push(slot); }
    groups[slot].push({meal: m, idx: i});
  });
  
  // Sort slots by time of first meal in each
  order.sort((a, b) => {
    const ta = groups[a][0].meal.time;
    const tb = groups[b][0].meal.time;
    return parseTimeStr(ta) - parseTimeStr(tb);
  });
  
  const slotsHTML = order.map(slot => {
    const items = groups[slot];
    const isMultiple = items.length > 1;
    const firstTime = items[0].meal.time;
    return `
      <div class="meal-slot">
        <div class="meal-slot-head">
          <div class="meal-slot-time">${firstTime}</div>
          <div class="meal-slot-name">${slot}</div>
          ${isMultiple ? `<div class="meal-slot-count">${items.length} options</div>` : ''}
        </div>
        <div class="meal-slot-options">
          ${items.map(it => renderMealCard(day.id, state.nutritionDiet, it.idx, it.meal)).join('')}
        </div>
      </div>
    `;
  }).join('');
  
  container.innerHTML = `
    <div style="padding:20px 20px 0">
      <div style="font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">${DAY_NAMES_FULL[day.id]} - ${day.type}</div>
      <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:16px">${day.type === 'Rest' ? 'Rest Day Meals' : "Today's Meals"}</div>
    </div>
    ${macrosCard}
    ${dietToggle}
    <div class="meal-slots">${slotsHTML}</div>
  `;
}

function parseTimeStr(t){
  // Convert '5:15 AM' to comparable number
  const parts = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!parts) return 0;
  let h = parseInt(parts[1]);
  const m = parseInt(parts[2]);
  const isPM = parts[3].toUpperCase() === 'PM';
  if (h === 12) h = 0;
  if (isPM) h += 12;
  return h * 60 + m;
}

function renderMealCard(dayId, diet, idx, m){
  const isCheat = m.label && m.label.includes('CHEAT MEAL');
  return `
    <div class="meal-card${isCheat ? ' cheat' : ''}" data-action="open-meal" data-day="${dayId}" data-diet="${diet}" data-idx="${idx}">

          <span>C:${m.carb}</span>
          <span>&middot;</span>
          <span>F:${m.fat}</span>
        </div>
      </div>
      <div class="meal-arrow">&rsaquo;</div>
    </div>`;
}

  DAYS.forEach(day => {
    if (!day.meals) return;
    if (state.nutritionDay !== 'all' && day.id !== state.nutritionDay) return;
    const meals = day.meals[state.nutritionDiet] || [];
    meals.forEach((m, idx) => {
      if (state.nutritionFilter !== 'all') {
        if (getMealCategory(m.time) !== state.nutritionFilter) return;
      }
      if (state.nutritionSearch) {
        const q = state.nutritionSearch.toLowerCase();
        const inName = m.name.toLowerCase().includes(q);
        const inIng = m.ing.some(i => i.toLowerCase().includes(q));
        if (!inName && !inIng) return;
      }
      matches.push({day, meal: m, idx});
    });
  });
  
  if (matches.length === 0) {
    results.innerHTML = `<div class="empty-state"><h3>No meals found</h3><p>Try changing filters or your search.</p></div>`;
    return;
  }
  
  // Group by day, then by slot within each day
  const byDay = {};
  const dayOrder = [];
  matches.forEach(m => {
    if (!byDay[m.day.id]) { byDay[m.day.id] = []; dayOrder.push(m.day.id); }
    byDay[m.day.id].push(m);
  });
  
  let html = `<div style="padding:8px 20px 4px;font-size:12px;color:#666;font-weight:500">${matches.length} meal${matches.length===1?'':'s'} found across ${dayOrder.length} day${dayOrder.length===1?'':'s'}</div>`;
  
  dayOrder.forEach(dayId => {
    const dayMatches = byDay[dayId];
    const dayName = DAY_NAMES_FULL[dayId];
    const day = DAYS.find(d => d.id === dayId);
    const dayLabel = day && day.type === 'Rest' ? `${dayName} (Rest Day)` : `${dayName} - ${day ? day.type : ''}`;
    
    // Group day's matches by slot
    const slots = {};
    const slotOrder = [];
    dayMatches.forEach(m => {
      const slot = m.meal.label.replace(' CHEAT MEAL', '').trim();
      if (!slots[slot]) { slots[slot] = []; slotOrder.push(slot); }
      slots[slot].push(m);
    });
    
    // Sort slots by time
    slotOrder.sort((a, b) => parseTimeStr(slots[a][0].meal.time) - parseTimeStr(slots[b][0].meal.time));
    
    html += `<div class="day-section-head">${dayLabel}</div>`;
    html += `<div class="meal-slots">`;
    
    slotOrder.forEach(slot => {
      const items = slots[slot];
      const isMultiple = items.length > 1;
      const firstTime = items[0].meal.time;
      html += `
        <div class="meal-slot">
          <div class="meal-slot-head">
            <div class="meal-slot-time">${firstTime}</div>
            <div class="meal-slot-name">${slot}</div>
            ${isMultiple ? `<div class="meal-slot-count">${items.length} option${items.length===1?'':'s'}</div>` : ''}
          </div>
          <div class="meal-slot-options">
            ${items.map(it => renderMealCard(it.day.id, state.nutritionDiet, it.idx, it.meal)).join('')}
          </div>
        </div>`;
    });
    
    html += `</div>`;
  });
  
  results.innerHTML = html;
}

// ===== MODAL =====
function showModal(html){
  const modal = document.getElementById('modal');
  modal.querySelector('.modal-sheet').innerHTML = html;
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
}

// ===== EVENT DELEGATION =====
function attachEvents(){
  document.addEventListener('click', (e) => {
    // Tab switcher
    const tab = e.target.closest('.tab[data-tab]');
    if (tab) { switchTab(tab.dataset.tab); return; }
    
    // Close modal on backdrop click
    if (e.target.id === 'modal') { closeModal(); return; }
    
    // Action elements (data-action)
    const action = e.target.closest('[data-action]');
    if (!action) return;
    
    const a = action.dataset.action;
    
    if (a === 'close-modal') { closeModal(); return; }
    
    if (a === 'goto-day') {
      const day = DAYS.find(d => d.id === action.dataset.day);
      if (day && day.type !== 'Rest') {
        state.workoutMode = 'today';
        state.workoutDay = action.dataset.day;
        switchTab('workouts');
        renderWorkoutsView();
      }
      return;
    }
    
    if (a === 'goto-today-workout') {
      state.workoutMode = 'today';
      state.workoutDay = getTrainingDayId();
      switchTab('workouts');
      renderWorkoutsView();
      return;
    }
    
    if (a === 'goto-rest') {
      state.workoutMode = 'today';
      state.workoutDay = getTodayId();
      switchTab('workouts');
      renderWorkoutsView();
      return;
    }
    
    if (a === 'goto-browse-workouts') {
      state.workoutMode = 'browse';
      switchTab('workouts');
      renderWorkoutsView();
      return;
    }
    
    if (a === 'goto-browse-meals') {
      state.nutritionMode = 'browse';
      switchTab('nutrition');
      renderNutritionView();
      return;
    }
    
    if (a === 'set-workout-mode') {
      state.workoutMode = action.dataset.mode;
      // Today mode ALWAYS shows today's plan, never a browse-filtered day
      if (state.workoutMode === 'today') {
        state.workoutDay = getTrainingDayId();
      }
      document.querySelectorAll('#view-workouts .mode-tab').forEach(t => 
        t.classList.toggle('active', t.dataset.mode === state.workoutMode));
      renderWorkoutContent();
      return;
    }
    
    if (a === 'set-workout-day') {
      state.workoutDay = action.dataset.day;
      renderBrowseWorkouts(document.getElementById('workout-content'));
      return;
    }
    
    if (a === 'set-workout-filter') {
      state.workoutFilter = action.dataset.filter;
      renderBrowseWorkouts(document.getElementById('workout-content'));
      return;
    }
    
    if (a === 'open-exercise') {
      const dayId = action.dataset.day;
      const bpIdx = parseInt(action.dataset.bp);
      const exIdx = parseInt(action.dataset.ex);
      openExerciseModal(dayId, bpIdx, exIdx);
      return;
    }
    
    if (a === 'toggle-variation') {
      action.classList.toggle('open');
      return;
    }
    
    if (a === 'set-nutrition-mode') {
      state.nutritionMode = action.dataset.mode;
      // Today mode ALWAYS shows today's plan, never a browse-filtered day
      if (state.nutritionMode === 'today') {
        state.nutritionDay = getTrainingDayId();
      }
      document.querySelectorAll('#view-nutrition .mode-tab').forEach(t => 
        t.classList.toggle('active', t.dataset.mode === state.nutritionMode));
      renderNutritionContent();
      return;
    }
    
    if (a === 'set-nutrition-day') {
      state.nutritionDay = action.dataset.day;
      renderBrowseNutrition(document.getElementById('nutrition-content'));
      return;
    }
    
    if (a === 'set-nutrition-filter') {
      state.nutritionFilter = action.dataset.filter;
      renderBrowseNutrition(document.getElementById('nutrition-content'));
      return;
    }
    
    if (a === 'open-recipe') {
      const idx = parseInt(action.dataset.idx);
      openRecipeModal(idx);
      return;
    }
    
    if (a === 'set-diet') {
      state.nutritionDiet = action.dataset.diet;
      renderNutritionContent();
      renderHomeMeals();
      return;
    }
    
    if (a === 'open-meal') {
      const dayId = action.dataset.day;
      const diet = action.dataset.diet;
      const idx = parseInt(action.dataset.idx);
      openMealModal(dayId, diet, idx);
      return;
    }
  });
  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });
}

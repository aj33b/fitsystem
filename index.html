<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitSystem">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>FitSystem</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#000;color:#fff;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(255,59,48,0.15) 0%,transparent 70%);top:-200px;left:-200px;animation:float1 20s ease-in-out infinite}
.bg::after{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(232,101,160,0.12) 0%,transparent 70%);bottom:-150px;right:-150px;animation:float2 25s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(100px,150px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-100px,-150px)}}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;max-width:480px;margin:0 auto}
.logo{margin-bottom:48px;text-align:center}
.logo-mark{width:72px;height:72px;margin:0 auto 20px;border-radius:20px;background:linear-gradient(135deg,#ff3b30,#e865a0);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;letter-spacing:-1px;color:#fff;box-shadow:0 10px 40px rgba(255,59,48,0.3)}
.logo-name{font-size:32px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#fff 0%,#888 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.logo-tag{font-size:13px;color:#666;margin-top:6px;letter-spacing:1px;font-weight:500}
.greeting{text-align:center;margin-bottom:32px}
.greeting h2{font-size:22px;font-weight:600;margin-bottom:6px;letter-spacing:-0.3px}
.greeting p{font-size:14px;color:#888}
.profiles{display:flex;flex-direction:column;gap:14px;width:100%}
.profile-card{background:rgba(20,20,24,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:20px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);text-decoration:none;color:#fff;touch-action:manipulation;position:relative;overflow:hidden}
.profile-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,0.05) 100%);opacity:0;transition:opacity 0.3s}
.profile-card:active{transform:scale(0.98)}
.profile-card:active::before{opacity:1}
.profile-card.male{border-color:rgba(255,59,48,0.3)}
.profile-card.female{border-color:rgba(232,101,160,0.3)}
.profile-avatar{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:24px;font-weight:700;letter-spacing:-0.5px}
.profile-card.male .profile-avatar{background:linear-gradient(135deg,#ff3b30,#ff6b5b);color:#fff;box-shadow:0 6px 20px rgba(255,59,48,0.3)}
.profile-card.female .profile-avatar{background:linear-gradient(135deg,#e865a0,#f59bc4);color:#fff;box-shadow:0 6px 20px rgba(232,101,160,0.3)}
.profile-info{flex:1;min-width:0}
.profile-name{font-weight:700;font-size:17px;margin-bottom:3px;letter-spacing:-0.2px}
.profile-desc{font-size:12px;color:#888;line-height:1.4;display:flex;gap:8px;flex-wrap:wrap}
.profile-desc span{display:inline-flex;align-items:center;gap:4px}
.profile-desc i{display:inline-block;width:3px;height:3px;background:#666;border-radius:50%}
.profile-arrow{color:#444;font-size:24px;font-weight:300}
.ios-hint{margin-top:32px;padding:14px 16px;background:rgba(20,20,24,0.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);border-radius:14px;font-size:12px;color:#888;text-align:center;line-height:1.6;display:none;width:100%}
.ios-hint.show{display:block}
.ios-hint b{color:#fff}
.ios-hint .icon{display:inline-block;width:18px;height:18px;background:#fff;color:#000;border-radius:4px;text-align:center;line-height:18px;font-weight:700;margin:0 2px;vertical-align:middle}
.copyright{margin-top:auto;padding-top:32px;font-size:11px;color:#444;letter-spacing:1px;font-weight:500}
@media (max-height:700px){.logo{margin-bottom:32px}.greeting{margin-bottom:24px}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-mark">F</div>
    <div class="logo-name">FitSystem</div>
    <div class="logo-tag">TRANSFORM &middot; SCULPT &middot; THRIVE</div>
  </div>
  <div class="greeting">
    <h2>Welcome back</h2>
    <p>Choose your profile to continue</p>
  </div>
  <div class="profiles">
    <a href="ajeeb.html" class="profile-card male">
      <div class="profile-avatar">A</div>
      <div class="profile-info">
        <div class="profile-name">Ajeeb's Plan</div>
        <div class="profile-desc">
          <span>Push/Pull/Legs</span><i></i><span>65&rarr;70 kg</span><i></i><span>6 days</span>
        </div>
      </div>
      <div class="profile-arrow">&rsaquo;</div>
    </a>
    <a href="nafisha.html" class="profile-card female">
      <div class="profile-avatar">N</div>
      <div class="profile-info">
        <div class="profile-name">Nafisha's Plan</div>
        <div class="profile-desc">
          <span>Tone &amp; Sculpt</span><i></i><span>62&rarr;55 kg</span><i></i><span>5 days</span>
        </div>
      </div>
      <div class="profile-arrow">&rsaquo;</div>
    </a>
  </div>
  <div class="ios-hint" id="iosHint">
    <b>Install FitSystem as an app</b><br>
    Tap <span class="icon">&uarr;</span> Share, then <b>Add to Home Screen</b>
  </div>
  <div class="copyright">FITSYSTEM v3.0 &middot; PWA</div>
</div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
if(isIOS&&!isStandalone){setTimeout(()=>document.getElementById('iosHint').classList.add('show'),1500);}
</script>
</body>
</html>
